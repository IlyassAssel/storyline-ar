<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin: 0; background: #000; }
#status { color: white; font-family: sans-serif; padding: 20px; font-size: 16px; }
video { width: 100%; height: 100vh; object-fit: cover; }
</style>
</head>
<body>
<div id="status"> Loading the camera...</div>
<script>
navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
  .then(function(stream) {
    document.getElementById('status').textContent = 'The camera is working! Point to the marker.';
    var video = document.createElement('video');
    video.srcObject = stream;
    video.autoplay = true;
    video.playsinline = true;
    document.body.appendChild(video);
    window.parent.postMessage('corner_dragged', '*');
  })
  .catch(function(err) {
    document.getElementById('status').textContent = 'Camera error: ' + err.message;
  });
</script>
</body>
</html>
