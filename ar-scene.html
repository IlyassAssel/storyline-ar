<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image.prod.js"></script>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>
  <a-scene
    mindar-image="imageTargetSrc: https://raw.githubusercontent.com/ilyassassel/storyline-ar/main/targets.mind;"
    color-space="sRGB"
    renderer="colorManagement: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <!-- Треугольник Triple Constraint -->
      <a-triangle
        color="#378ADD"
        opacity="0.7"
        position="0 0 0"
        rotation="0 0 0"
        scale="0.5 0.5 0.5">
      </a-triangle>

      <!-- Текст по углам -->
      <a-text value="Scope" position="-0.3 0.3 0" color="#ffffff" scale="0.5 0.5 0.5"></a-text>
      <a-text value="Time" position="0.3 0.3 0" color="#ffffff" scale="0.5 0.5 0.5"></a-text>
      <a-text value="Cost" position="0 -0.3 0" color="#ffffff" scale="0.5 0.5 0.5"></a-text>
      <a-text value="Quality" position="0 0 0.1" color="#1D9E75" scale="0.4 0.4 0.4"></a-text>
    </a-entity>
  </a-scene>
</body>
</html>
