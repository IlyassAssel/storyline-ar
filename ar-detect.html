<!DOCTYPE html>
<html>
<body>
<script>
setTimeout(function() {
  navigator.mediaDevices.getUserMedia({ video: true })
    .then(function(stream) {
      stream.getTracks().forEach(function(t) { t.stop(); });
      try {
        window.parent.GetPlayer().SetVar('bool_ar_supported', true);
      } catch(e) {}
    })
    .catch(function() {
      try {
        window.parent.GetPlayer().SetVar('bool_ar_supported', false);
      } catch(e) {}
    });
}, 1000);
</script>
</body>
</html>
