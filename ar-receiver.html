<!DOCTYPE html>
<html>
<body>
<script>
window.addEventListener('message', function(e) {
  if (e.data === 'ar_supported') {
    try {
      var p = window.parent.GetPlayer();
      p.SetVar('bool_ar_supported', true);
    } catch(err) {
      console.log('GetPlayer error:', err);
    }
  } else if (e.data === 'ar_not_supported') {
    try {
      var p = window.parent.GetPlayer();
      p.SetVar('bool_ar_supported', false);
    } catch(err) {
      console.log('GetPlayer error:', err);
    }
  }
});
</script>
</body>
</html>
